spring:
  application:
    name: loveable

  config:
    import:
      - optional:classpath:application-stripe.yaml
      - optional:classpath:application-keys.yaml

  datasource:
    url: jdbc:postgresql://localhost:9010/lovableDB
    username: user
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: Asia/Kolkata

  data:
    redis:
      host: localhost
      port: 6379

  ai:
    openai:
      chat:
        options:
         # model: gpt-5-mini-2025-08-07
          model: gpt-5.2-2025-12-11
         # model: gpt-5.2-codex
      embedding:
        options:
          model: text-embedding-3-small
          temperature: 0.5

server:
  port: 8082

jwt:
  secret-key: ahduiahf7erfdjsoihf4y52jfashf0usd0f0dfnisa843nakbfi33nr9g8

client:
  url: http://localhost:8082


